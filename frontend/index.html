<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 로그인 / 회원가입 화면 -->
  <div id="auth-view" class="max-w-sm mx-auto py-20 px-4">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">업무관리 로그인</h1>
    <form id="auth-form" class="bg-white rounded-lg shadow p-6 space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
        <input id="auth-username" type="text" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input id="auth-password" type="password" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <p id="auth-error" class="text-sm text-red-600 hidden"></p>
      <div class="flex gap-2">
        <button type="submit" id="login-btn"
          class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">로그인</button>
        <button type="button" id="register-btn"
          class="flex-1 bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">회원가입</button>
      </div>
    </form>
  </div>

  <!-- 업무관리 보드 화면 -->
  <div id="board-view" class="max-w-3xl mx-auto py-10 px-4 hidden">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">팀 업무관리 보드</h1>
      <div class="flex items-center gap-3">
        <span id="current-user" class="text-sm text-gray-600"></span>
        <button id="logout-btn" class="text-sm text-red-600 hover:underline">로그아웃</button>
      </div>
    </div>

    <form id="task-form" class="bg-white rounded-lg shadow p-4 mb-6 space-y-3">
      <input type="hidden" id="task-id" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
        <input id="title" type="text" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">설명</label>
        <textarea id="description" rows="2"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">상태</label>
          <select id="status"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="todo">할 일</option>
            <option value="in_progress">진행 중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">담당자</label>
          <select id="assignee"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="">미지정</option>
          </select>
        </div>
      </div>
      <div class="flex gap-2">
        <button type="submit"
          class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">저장</button>
        <button type="button" id="cancel-edit"
          class="hidden bg-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-400">취소</button>
      </div>
    </form>

    <ul id="task-list" class="space-y-3"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
